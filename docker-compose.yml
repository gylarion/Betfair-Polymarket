version: "3.8"

services:
  backend:
    build: ./backend
    container_name: bf-pm-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: bf-pm-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
