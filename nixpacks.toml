[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "cd backend && pip install -r requirements.txt",
    "cd dashboard && npm install && npm run build"
]

[phases.build]
cmds = [
    "mkdir -p backend/static",
    "cp -r dashboard/dist/* backend/static/ 2>/dev/null || true"
]

[start]
cmd = "cd backend && python -m uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000}"
